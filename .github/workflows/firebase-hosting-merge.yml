# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create stub firebase_options.dart
        run: |
          echo "import 'package:firebase_core/firebase_core.dart' show FirebaseOptions; class DefaultFirebaseOptions { static FirebaseOptions get currentPlatform => web; static const FirebaseOptions web = FirebaseOptions(apiKey: 'stub', appId: 'stub', messagingSenderId: 'stub', projectId: 'stub'); }" > lib/firebase_options.dart
      - name: Create stub .env
        run: |
          echo "BIO=Flutter Developer & UI/UX Designer" > .env
          echo "EMAIL_URL=mailto:example@example.com" >> .env
          echo "LINKEDIN_URL=https://linkedin.com" >> .env
          echo "GITHUB_URL=https://github.com" >> .env
          echo "INSTAGRAM_URL=https://instagram.com" >> .env
      - run: flutter build web --release
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FAZAL_PORTFOLIO }}
          channelId: live
          projectId: fazal-portfolio
